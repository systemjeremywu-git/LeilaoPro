version: '3.8'

services:
  backend:
    image: ghcr.io/systemjeremywu-git/leilaopro-backend:latest
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-troque_isso_no_portainer}
      - N8N_SECRET=${N8N_SECRET:-015fb2f562210beda601c64678b107f340f53a12bcf6556a331e0638a8326c44}
      - N8N_WEBHOOK_EDITAL_URL=${N8N_WEBHOOK_EDITAL_URL:-}
      - N8N_WEBHOOK_CONTRATO_URL=${N8N_WEBHOOK_CONTRATO_URL:-}
    volumes:
      - leilaopro_db:/app/data
      - leilaopro_uploads:/app/uploads
    networks:
      - hubkron
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=hubkron"
        # ROTEAMENTO DA API
        - "traefik.http.routers.leilaopro-api.rule=Host(`leilaopro.hubkron.uk`) && PathPrefix(`/api`)"
        - "traefik.http.routers.leilaopro-api.entrypoints=websecure"
        - "traefik.http.routers.leilaopro-api.tls=true"
        - "traefik.http.routers.leilaopro-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.leilaopro-api.priority=100"
        - "traefik.http.services.leilaopro-api.loadbalancer.server.port=3000"

  frontend:
    image: ghcr.io/systemjeremywu-git/leilaopro-frontend:latest
    networks:
      - hubkron
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=hubkron"
        # ROTEAMENTO DO FRONTEND
        - "traefik.http.routers.leilaopro.rule=Host(`leilaopro.hubkron.uk`)"
        - "traefik.http.routers.leilaopro.entrypoints=websecure"
        - "traefik.http.routers.leilaopro.tls=true"
        - "traefik.http.routers.leilaopro.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.leilaopro.loadbalancer.server.port=80"
        # BLOQUEIO DE ARQUIVOS SENSÍVEIS (.env, .git, .docker)
        - "traefik.http.routers.leilaopro-block.rule=Host(`leilaopro.hubkron.uk`) && (PathPrefix(`/.env`) || PathPrefix(`/.git`) || PathPrefix(`/.docker`))"
        - "traefik.http.routers.leilaopro-block.entrypoints=websecure"
        - "traefik.http.routers.leilaopro-block.tls=true"
        - "traefik.http.routers.leilaopro-block.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.leilaopro-block.priority=200"
        - "traefik.http.routers.leilaopro-block.service=noop@internal"

networks:
  hubkron:
    external: true

volumes:
  leilaopro_db:
  leilaopro_uploads:
