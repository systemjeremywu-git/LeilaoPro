version: '3.8'

services:
  backend:
    image: ghcr.io/systemjeremywu-git/leilaopro-backend:latest
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - leilaopro_db:/app/db
      - leilaopro_uploads:/app/uploads
    networks:
      - leilaopro_network
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  frontend:
    image: ghcr.io/systemjeremywu-git/leilaopro-frontend:latest
    networks:
      - leilaopro_network
      - hubkron
    deploy:
      restart_policy:
        condition: on-failure
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=hubkron"
        - "traefik.http.routers.leilaopro-router.rule=Host(`leilaopro.hubkron.uk`)"
        - "traefik.http.routers.leilaopro-router.entrypoints=websecure"
        - "traefik.http.routers.leilaopro-router.tls=true"
        - "traefik.http.routers.leilaopro-router.tls.certresolver=letsencryptresolver"
        - "traefik.http.routers.leilaopro-router.service=leilaopro-service"
        - "traefik.http.services.leilaopro-service.loadbalancer.server.port=80"

networks:
  leilaopro_network:
    name: leilaopro_overlay
    driver: overlay
    attachable: true
  hubkron:
    external: true

volumes:
  leilaopro_db:
  leilaopro_uploads:
