version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: leilaopro_backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - ./backend/db:/app/db
      - ./backend/uploads:/app/uploads
    networks:
      - leilaopro_network

  frontend:
    image: nginx:stable-alpine
    container_name: leilaopro_frontend
    restart: always
    volumes:
      - ./frontend:/usr/share/nginx/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "8080:80"
    networks:
      - leilaopro_network

networks:
  leilaopro_network:
    driver: bridge
