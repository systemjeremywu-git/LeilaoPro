name: Build and Push Docker Images

on:
  push:
    branches:
      - dev
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend
        run: |
          docker build -t ghcr.io/systemjeremywu-git/leilaopro-backend:latest ./backend

      - name: Push Backend
        run: |
          docker push ghcr.io/systemjeremywu-git/leilaopro-backend:latest

      - name: Build Frontend
        run: |
          docker build -t ghcr.io/systemjeremywu-git/leilaopro-frontend:latest ./frontend

      - name: Push Frontend
        run: |
          docker push ghcr.io/systemjeremywu-git/leilaopro-frontend:latest
