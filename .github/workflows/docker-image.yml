name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build backend
        run: |
          docker build -t ghcr.io/systemjeremywu-git/leilaopro-backend:latest ./backend

      - name: Push backend
        run: |
          docker push ghcr.io/systemjeremywu-git/leilaopro-backend:latest

      - name: Build frontend
        run: |
          docker build -t ghcr.io/systemjeremywu-git/leilaopro-frontend:latest ./frontend

      - name: Push frontend
        run: |
          docker push ghcr.io/systemjeremywu-git/leilaopro-frontend:latest
