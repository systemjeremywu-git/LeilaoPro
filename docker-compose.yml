version: '3.8'

services:
  backend:
    image: ghcr.io/systemjeremywu-git/leilaopro-backend:latest
    environment:
      - NODE_ENV=production
      - PORT=3000
    volumes:
      - leilaopro_db:/app/db
      - leilaopro_uploads:/app/uploads
    networks:
      - leilaopro_network
    deploy:
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager

  frontend:
    image: ghcr.io/systemjeremywu-git/leilaopro-frontend:latest
    ports:
      - "80:80"
    networks:
      - leilaopro_network
    deploy:
      restart_policy:
        condition: on-failure

networks:
  leilaopro_network:
    name: leilaopro_overlay
    driver: overlay
    attachable: true

volumes:
  leilaopro_db:
  leilaopro_uploads:
